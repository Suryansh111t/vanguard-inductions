services:
  vanguard-sim:
    build: .
    image: vanguard-inductions:latest
    container_name: vanguard_sim
    # Required for the Jammy/Humble-based VNC image — see:
    # https://github.com/Tiryoh/docker-ros2-desktop-vnc/pull/56
    security_opt:
      - seccomp:unconfined
    shm_size: "512m"
    ports:
      - "6080:80"     # noVNC desktop -> http://localhost:6080
    volumes:
      - ./tasks/task1:/home/ubuntu/vanguard_ws/src/task1
      - ./tasks/task2:/home/ubuntu/vanguard_ws/src/task2
      - ./tasks/task3:/home/ubuntu/vanguard_ws/src/task3
    restart: unless-stopped
